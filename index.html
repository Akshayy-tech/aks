<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Login</title>

  <style>
    body{
      margin:0;
      padding:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#121212;
      font-family:Arial, sans-serif;
    }

    .login-box{
      background:#1e1e1e;
      padding:30px;
      border-radius:12px;
      width:300px;
      text-align:center;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    .login-box h2{
      color:white;
      margin-bottom:20px;
    }

    .input-box{
      margin:15px 0;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#00b894;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    .login-btn:hover{
      background:#00a383;
    }

    .extra{
      color:#ccc;
      margin-top:15px;
      font-size:14px;
    }

    .extra a{
      color:#00b894;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Game Login</h2>

    <form>
      <div class="input-box">
        <input type="text" placeholder="Username" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
      </div>

      <button type="submit" class="login-btn">
        Login
      </button>

      <div class="extra">
        Don't have an account?
        <a href="#">Register</a>
      </div>
    </form>
  </div>

</body>
</html>
